<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <title>WHISP // TERMINAL v1.0</title>
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
<div id="app-container">
    <header id="top-bar">
        <div class="navbar-grid">
            <div class="logo-wrapper">
                <div class="ascii-art"></div>
                <div class="ascii-signature"></div>
            </div>
            
            <div class="os-controls">
                <div class="status-grid module-box">
                    <div class="status-item cli-btn-static">
                        <span class="label">TKN</span> <span id="zgtVal">0</span>
                    </div>
                </div>

                <div class="settings-panel module-box">
                    <div class="grid-cell">
                        <span class="label">MOD</span>
                        <select id="precisionSelect">
                            <option value="turbo" selected>TRB</option>
                            <option value="base">BAS</option>
                            <option value="tiny">TNY</option>
                        </select>
                    </div>
                    <div class="grid-cell">
                        <span class="label">LNG</span>
                        <select id="languageSelect"></select>
                    </div>
                    <div class="grid-cell">
                        <span class="label">SRC</span>
                        <select id="audioSource">
                            <option value="mic">MIC</option>
                            <option value="system">SYS</option>
                        </select>
                    </div>
                </div> 
                
                <button id="sysPowerBtn" class="power-btn module-box">&#9658;</button>

                <div class="controls-grid module-box">
                    <button id="exportBtn" class="cli-btn">EXPORT</button>
                    <button id="clearBtn" class="cli-btn" style="color: var(--term-warn);">FLUSH</button>
                </div>
            </div>
        </div>
    </header>

    <main id="terminal-screen">
        <div id="output" contenteditable="true" spellcheck="false"></div>
    </main>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
