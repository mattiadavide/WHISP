<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <title>WHISP // CORE_OS [HYBRID]</title>
    <style>
        :root { 
            --bg: #050505; --fg: #e0e0e0; --dim: #555; 
            --accent: #00ff41; --err: #ff3e3e; --warn: #ffb86c; --info: #00bfff;
            --font: 'Fira Code', 'Courier New', monospace;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--fg); font-family: var(--font);
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; text-transform: uppercase; font-size: 13px;
        }

        /* --- UI COMPONENTS --- */
        #kernel-header { padding: 15px; border-bottom: 1px solid var(--dim); display: flex; justify-content: space-between; align-items: center; }
        #terminal-ui { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        
        #output-stream { 
            flex: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.6;
            padding-right: 10px; scroll-behavior: smooth; border: 1px solid #111;
            background: rgba(0,0,0,0.3); padding: 15px; margin-bottom: 15px;
            outline: none;
        }

        .system-panel { background: #111; border: 1px solid var(--dim); padding: 10px; margin-bottom: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        
        /* --- ELEMENTS --- */
        select, button, input { background: transparent; color: var(--fg); border: 1px solid var(--dim); padding: 5px; font-family: inherit; cursor: pointer; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button:disabled { color: var(--dim); cursor: not-allowed; border-color: var(--dim); }
        
        .stat-bar { font-size: 10px; display: flex; gap: 20px; color: var(--dim); margin-top: 5px; }
        .stat-val { color: var(--fg); }
        
        .word-node { transition: all 0.2s; padding: 0 2px; position: relative; }
        .word-node.low-conf { color: var(--warn); border-bottom: 1px dotted var(--warn); }
        .word-node.healed { color: var(--accent); }
        .word-node.shielded { color: #a3f; }

        #state-indicator { padding: 2px 8px; border-radius: 2px; font-weight: bold; background: var(--dim); color: #000; }
        #state-indicator.BOOTING { background: var(--info); }
        #state-indicator.ONLINE { background: var(--accent); }
        #state-indicator.ERROR { background: var(--err); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--dim); }
    </style>
</head>
<body>

<header id="kernel-header">
    <div>WHISP // HYBRID_CORE [SYSTEM_READY]</div>
    <div id="state-indicator">IDLE</div>
</header>

<main id="terminal-ui">
    <div class="system-panel">
        <select id="model-cfg">
            <option value="turbo">LARGE_TURBO (FP16)</option>
            <option value="base">BASE (FP16)</option>
            <option value="tiny">TINY (FP16)</option>
        </select>
        <select id="lang-cfg">
            <option value="italian">ITA</option>
            <option value="english">ENG</option>
        </select>
        <select id="domain-cfg">
            <option value="general">DOM: GENERAL</option>
            <option value="tech">DOM: TECH</option>
            <option value="finance">DOM: FINANCE</option>
        </select>
        <button id="master-switch">SYS_BOOT()</button>
    </div>

    <div id="output-stream" contenteditable="true" spellcheck="false"></div>

    <div class="system-panel" style="margin-bottom: 0;">
        <div class="telemetry">
            <div class="stat-bar">SIG_RMS: <span id="tele-rms">[--------------------]</span></div>
            <div class="stat-bar">VAD_PROB: <span id="tele-vad">[--------------------]</span></div>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end; align-items: center;">
            <button id="clear-log">FLUSH</button>
            <button id="export-log">EXPORT</button>
        </div>
    </div>
</main>

<script type="module">
    // Algoritmo di Levenshtein (Integrato nel thread principale per velocità sulle singole frasi)
    function levenshtein(a, b) {
        const m = []; for (let i = 0; i <= b.length; i++) m[i] = [i]; for (let j = 0; j <= a.length; j++) m[0][j] = j;
        for (let i = 1; i <= b.length; i++) { for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i-1) === a.charAt(j-1)) m[i][j] = m[i-1][j-1];
            else m[i][j] = Math.min(m[i-1][j-1] + 1, Math.min(m[i][j-1] + 1, m[i-1][j] + 1));
        } } return m[b.length][a.length];
    }

    // --- WORKER KERNELS ---
    const VAD_KERNEL = `
        import { AutoModel, Tensor, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3/dist/transformers.min.js';
        env.allowLocalModels = false;
        let model, state, whisperPort, isSpeaking = false, silenceCount = 0;
        const SR = new Tensor('int64', new BigInt64Array([16000n]), [1]);

        self.onmessage = async (e) => {
            if (e.data.type === 'init') {
                model = await AutoModel.from_pretrained('onnx-community/silero-vad', { config: { model_type: 'custom' } });
                state = new Tensor('float32', new Float32Array(2 * 1 * 128), [2, 1, 128]);
                self.postMessage({ type: 'ready' });
            } 
            if (e.data.type === 'port') whisperPort = e.data.port;
            if (e.data.type === 'audio') {
                const input = new Tensor('float32', e.data.chunk, [1, 512]);
                const out = await model({ input, sr: SR, state });
                state = out.stateN || out.staten;
                const prob = out.output.data[0];
                
                if (prob > 0.5) {
                    if (!isSpeaking) isSpeaking = true;
                    silenceCount = 0;
                    whisperPort.postMessage({ type: 'stream', data: e.data.chunk }, [e.data.chunk]);
                } else {
                    if (isSpeaking) {
                        silenceCount++;
                        whisperPort.postMessage({ type: 'stream', data: e.data.chunk }, [e.data.chunk]);
                        if (silenceCount > 40) { // ~1.2s di silenzio: INVIO BATCH
                            isSpeaking = false;
                            whisperPort.postMessage({ type: 'commit' });
                        }
                    }
                }
                self.postMessage({ type: 'telemetry', prob, isSpeaking });
            }
        };
    `;

    const WHISPER_KERNEL = `
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3/dist/transformers.min.js';
        env.allowLocalModels = false;
        let pipe, audioBuffer = [], isBusy = false;

        self.onmessage = async (e) => {
            if (e.data.type === 'init') {
                try {
                    pipe = await pipeline('automatic-speech-recognition', 'onnx-community/whisper-' + e.data.model, { 
                        device: 'webgpu', dtype: 'fp16', progress_callback: (p) => self.postMessage({type: 'progress', p: p.progress}) 
                    });
                } catch(err) {
                    pipe = await pipeline('automatic-speech-recognition', 'onnx-community/whisper-' + e.data.model, { device: 'wasm', dtype: 'fp32' });
                }
                self.postMessage({ type: 'ready' });
            }
            if (e.data.type === 'stream') audioBuffer.push(...e.data.data);
            if (e.data.type === 'commit' && !isBusy && audioBuffer.length > 8000) {
                isBusy = true;
                const float32 = new Float32Array(audioBuffer);
                audioBuffer = [];
                const res = await pipe(float32, { language: e.data.lang, task: 'transcribe' });
                
                // Filtra allucinazioni classiche di Whisper
                if (!/♪|\\[.*?\\]|\\*.*?\\*/.test(res.text)) {
                    self.postMessage({ type: 'final', text: res.text });
                }
                isBusy = false;
            }
        };
    `;

    // --- MAIN SYSTEM CONTROLLER ---
    const SystemKernel = {
        state: 'IDLE', workers: {}, referenceDict: new Set(),
        dom: {
            output: document.getElementById('output-stream'),
            indicator: document.getElementById('state-indicator'),
            masterBtn: document.getElementById('master-switch'),
            teleRms: document.getElementById('tele-rms'),
            teleVad: document.getElementById('tele-vad')
        },

        setState(s) {
            this.state = s; this.dom.indicator.innerText = s; this.dom.indicator.className = s;
        },

        async boot() {
            this.setState('BOOTING'); this.dom.masterBtn.disabled = true;

            await this.syncZeitgeist(document.getElementById('domain-cfg').value);

            this.workers.vad = this.createWorker(VAD_KERNEL);
            this.workers.whisper = this.createWorker(WHISPER_KERNEL);

            const channel = new MessageChannel();
            this.workers.vad.postMessage({ type: 'port', port: channel.port1 }, [channel.port1]);
            this.workers.whisper.postMessage({ type: 'init', model: document.getElementById('model-cfg').value, lang: document.getElementById('lang-cfg').value }, [channel.port2]);
            this.workers.vad.postMessage({ type: 'init' });

            this.workers.vad.onmessage = (e) => this.handleVadMessage(e.data);
            this.workers.whisper.onmessage = (e) => this.handleWhisperMessage(e.data);
        },

        createWorker(code) {
            return new Worker(URL.createObjectURL(new Blob([code], { type: 'application/javascript' })), { type: 'module' });
        },

        async startAudio() {
            const ctx = new AudioContext({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            await ctx.audioWorklet.addModule(URL.createObjectURL(new Blob([`
                class P extends AudioWorkletProcessor {
                    process(inputs) {
                        const input = inputs[0][0];
                        if (input) {
                            let sum = 0; for(let i=0; i<input.length; i++) sum += input[i]*input[i];
                            this.port.postMessage({ type: 'audio', chunk: input, rms: Math.sqrt(sum/input.length) });
                        }
                        return true;
                    }
                }
                registerProcessor('audio-processor', P);
            `], { type: 'text/javascript' })));

            const source = ctx.createMediaStreamSource(stream);
            const node = new AudioWorkletNode(ctx, 'audio-processor');
            node.port.onmessage = (e) => {
                this.updateMeter(this.dom.teleRms, e.data.rms * 10);
                this.workers.vad.postMessage({ type: 'audio', chunk: e.data.chunk });
            };
            source.connect(node);
            this.setState('ONLINE');
        },

        // --- IL CUORE IBRIDO: Refining e Healing avvengono QUI prima del render ---
        handleWhisperMessage(d) {
            if (d.type === 'ready') this.startAudio();
            if (d.type === 'final') {
                let text = d.text.trim();
                
                // 1. REFINING (Regex Semantiche)
                text = text.replace(/\b(\w{2,12})\b(?:\s+\1\b)+/gi, '$1').replace(/ {2,}/g, ' '); 
                const semanticPatches = [
                    { rx: /\bradiocronica\b/gi, rep: 'radiocronaca' },
                    { rx: /\bradioconista\b/gi, rep: 'radiocronista' },
                    { rx: /vengon piazati/gi, rep: 'vengono piazzati' },
                    { rx: /\b(lo|dello|allo|sullo|il|al|sul|del)\s+port\b/gi, rep: '$1 sport' },
                    { rx: /\bper\s+che\b/gi, rep: 'perché' },
                    { rx: /\bci\s+e\b/gi, rep: 'c\\'è' }
                ];
                semanticPatches.forEach(p => { text = text.replace(p.rx, p.rep); });

                // 2. HEALING & DOM INJECTION (Niente DOM Thrashing)
                const activeRef = Array.from(this.referenceDict);
                const words = text.split(' ');

                words.forEach(w => {
                    const span = document.createElement('span');
                    span.className = 'word-node';
                    
                    const match = w.match(/^([^a-zA-ZÀ-ÿ]*)([a-zA-ZÀ-ÿ]+)([^a-zA-ZÀ-ÿ]*)$/);
                    let finalWord = w;

                    if (match) {
                        const [_, prefix, core, suffix] = match; 
                        const lower = core.toLowerCase();
                        
                        if (lower.length >= 4) {
                            let best = null, minDist = Infinity;
                            activeRef.forEach(ref => { 
                                if (Math.abs(ref.length - lower.length) <= 2) {
                                    let dist = levenshtein(lower, ref); 
                                    if (dist < minDist) { minDist = dist; best = ref; } 
                                }
                            });

                            if (best && (minDist <= 1 || minDist / lower.length <= 0.15)) {
                                const restored = core[0] === core[0].toUpperCase() ? best[0].toUpperCase() + best.slice(1) : best;
                                finalWord = prefix + restored + suffix;
                                span.classList.add('healed');
                            }
                        }
                    }

                    span.innerText = finalWord + ' ';
                    this.dom.output.appendChild(span);
                });
                
                this.dom.output.appendChild(document.createElement('br'));
                this.dom.output.scrollTop = this.dom.output.scrollHeight;
            }
        },

        handleVadMessage(d) {
            if (d.type === 'telemetry') this.updateMeter(this.dom.teleVad, d.prob);
        },

        updateMeter(el, val) {
            const blocks = Math.min(Math.floor(val * 20), 20);
            el.innerText = '[' + '#'.repeat(blocks) + '-'.repeat(20 - blocks) + ']';
        },

        async syncZeitgeist(dom) {
            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent('https://news.google.com/rss?hl=it&gl=IT&ceid=IT:it')}`;
                const r = await fetch(proxy); const j = await r.json();
                const words = j.contents.match(/[a-zA-ZÀ-ÿ]{4,}/g) || [];
                words.forEach(w => this.referenceDict.add(w.toLowerCase()));
                console.log("ZEITGEIST_SYNC: " + this.referenceDict.size + " TOKENS LOADED.");
            } catch(e) { console.error("ZEITGEIST_OFFLINE"); }
        }
    };

    document.getElementById('master-switch').onclick = () => SystemKernel.boot();
    document.getElementById('clear-log').onclick = () => SystemKernel.dom.output.innerHTML = '';
    
    document.getElementById('export-log').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([SystemKernel.dom.output.innerText], { type: 'text/plain' }));
        a.download = `WHISP_LOG_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    };
</script>
</body>
</html>
