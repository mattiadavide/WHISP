<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <title>WHISP // TERMINAL 2.0</title>
    <style>
        :root { --term-bg: #000; --term-main: #fff; --term-dim: #777; --term-err: #f44; --term-ok: #0f0; --term-warn: #ff0; }
        body { background: var(--term-bg); color: var(--term-main); font-family: 'Courier New', Courier, monospace; max-width: 950px; margin: 10px auto; padding: 20px; text-transform: uppercase; overflow-x: hidden; }
        .ascii-art { white-space: pre; font-size: clamp(5px, 0.8vw, 8px); line-height: 1.1; margin-bottom: 25px; font-weight: bold; color: var(--term-main); }
        .header { border: 1px solid var(--term-main); padding: 15px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.05); }
        .settings-panel { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        select, button { background: var(--term-bg); color: var(--term-main); border: 1px solid var(--term-main); padding: 8px; font-family: inherit; cursor: pointer; outline: none; flex-grow: 1; }
        button:hover { background: var(--term-main); color: var(--term-bg); }
        button:disabled { color: var(--term-dim); border-color: var(--term-dim); cursor: not-allowed; }
        .status-bar { border: 1px solid var(--term-main); padding: 15px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 240px; gap: 20px; align-items: center; }
        #output { border: none; background: transparent; padding: 10px 0; min-height: 300px; max-height: calc(100vh - 460px); overflow-y: auto; line-height: 1.7; color: #eee; text-transform: none; scroll-behavior: smooth; margin-bottom: 80px; outline: none; }
        .interim-text { color: var(--term-dim); font-style: italic; }
        .stat-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.75em; }
        .bar-bg { flex-grow: 1; height: 6px; background: #1a1a1a; border: 1px solid var(--term-dim); }
        .bar-fill { height: 100%; width: 0%; background: var(--term-main); transition: width 0.1s; }
        .vad-indicator { width: 12px; height: 12px; border: 1px solid var(--term-dim); }
        .vad-indicator.active { background: var(--term-ok); box-shadow: 0 0 10px var(--term-ok); border-color: var(--term-ok); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="ascii-art">
 ██╗    ██╗██╗  ██╗██╗███████╗██████╗ 
 ██║    ██║██║  ██║██║██╔════╝██╔══██╗
 ██║ █╗ ██║███████║██║███████║██████╔╝
 ██║███╗██║██╔══██║██║╚════██║██╔═══╝ 
 ╚███╔███╔╝██║  ██║██║███████║██║     
  ╚══╝╚══╝ ╚═╝  ╚═╝╚═╝╚══════╝╚═╝     
</div>

<div class="header">
    > MODULE_BOOT: WHISP_CORE_2.1_STABLE
    <div class="settings-panel">
        <select id="precisionSelect">
            <option value="fp16">ENGINE: LARGE_FP16</option>
            <option value="q8">ENGINE: STANDARD_Q8</option>
            <option value="q8-tiny">ENGINE: MOBILE_TINY</option>
        </select>
        <select id="languageSelect"></select>
        <select id="audioSource">
            <option value="mic">SRC: MICROPHONE</option>
            <option value="system">SRC: SYSTEM_AUDIO</option>
        </select>
        <button id="loadBtn">LOAD_CORE()</button>
    </div>
</div>

<div class="status-bar">
    <div>STATUS: <span id="status" class="blink">IDLE</span></div>
    <div class="stats-panel" style="display: flex; flex-direction: column; gap: 6px;">
        <div class="stat-row"><span>INPUT_RMS</span><div class="bar-bg"><div id="volFill" class="bar-fill" style="background: #444;"></div></div></div>
        <div class="stat-row"><span>NEURAL_VAD</span><div class="bar-bg"><div id="vadFill" class="bar-fill" style="background: var(--term-main);"></div></div></div>
        <div style="display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 5px;">
            <span id="probVal" style="font-size: 0.75em;">VAD: 0.00</span>
            <div class="vad-indicator" id="vadLed"></div>
        </div>
    </div>
</div>

<div style="margin-bottom: 10px; display: flex; gap: 10px;">
    <button id="startBtn" disabled>EXEC_START()</button>
    <button id="stopBtn" style="display:none; color: var(--term-err); border-color: var(--term-err);">TERMINATE()</button>
    <button id="exportBtn" style="margin-left: auto;">EXPORT</button>
    <button id="copyBtn">COPY</button>
    <button id="clearBtn">FLUSH</button>
</div>

<div id="output" contenteditable="true" spellcheck="false"></div>

<script type="module">
    const PHONETIC_DICT = { "l'automatica": "Lottomatica", "Radio Corpo": "Radiocor", "Zing": "Sync" };

    function applyPhoneticCorrections(text) {
        if (!text) return text;
        let processedText = text;
        for (const [wrong, right] of Object.entries(PHONETIC_DICT)) {
            const regex = new RegExp(`\\b${wrong.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'gi');
            processedText = processedText.replace(regex, right);
        }
        return processedText;
    }

    const UI = {
        status: document.getElementById('status'), precisionSelect: document.getElementById('precisionSelect'),
        languageSelect: document.getElementById('languageSelect'), audioSource: document.getElementById('audioSource'),
        loadBtn: document.getElementById('loadBtn'), startBtn: document.getElementById('startBtn'),
        stopBtn: document.getElementById('stopBtn'), output: document.getElementById('output'),
        vadLed: document.getElementById('vadLed'), vadFill: document.getElementById('vadFill'),
        volFill: document.getElementById('volFill'), probVal: document.getElementById('probVal'),
        clearBtn: document.getElementById('clearBtn'), copyBtn: document.getElementById('copyBtn'),
        exportBtn: document.getElementById('exportBtn')
    };

    const LANGUAGES = { "italian": "ITA", "english": "ENG", "spanish": "ESP", "french": "FRA", "german": "GER" };
    for (const [c, n] of Object.entries(LANGUAGES)) {
        const o = document.createElement("option"); o.value = c; o.text = n; UI.languageSelect.appendChild(o);
    }

    // --- WORKER VAD (CORE LOGIC) ---
    const vadWorkerCode = `
        import { AutoModel, Tensor, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3/dist/transformers.min.js';
        env.allowLocalModels = false;

        let vadModel = null, state = null, whisperPort = null;
        let isSpeaking = false, silenceFrames = 0, isWhisperReady = false;
        let pendingChunks = [], audioArr = null, ptrArr = null, nativeRate = 16000, readPtr = 0;
        
        const THRESHOLD_START = 0.55, THRESHOLD_HOLD = 0.35, MAX_FRAMES = 900;
        let SILENCE_LIMIT = 25, PRE_ROLL_CAPACITY = 10;
        const audioBuf = new Float32Array(MAX_FRAMES * 512);
        const preRoll = new Float32Array(24 * 512);
        let audioBufPtr = 0, preRollPtr = 0, preRollCount = 0;
        let internalBuffer = new Float32Array(512), internalPtr = 0;

        // FIX 3: Resampling Matematico (No DOM API)
        function resample(chunk, inRate, outRate) {
            if (inRate === outRate) return chunk;
            const ratio = inRate / outRate;
            const outLength = Math.floor(chunk.length / ratio);
            const resampled = new Float32Array(outLength);
            for (let i = 0; i < outLength; i++) {
                let sum = 0, count = 0, inIdx = i * ratio;
                const start = Math.max(0, Math.floor(inIdx) - 1), end = Math.min(chunk.length, Math.ceil(inIdx) + 1);
                for (let j = start; j < end; j++) { sum += chunk[j]; count++; }
                resampled[i] = sum / count;
            }
            return resampled;
        }

        async function runVAD(audioChunk) {
            if (!vadModel) return;
            if (isSpeaking) {
                audioBuf.set(audioChunk, audioBufPtr * 512); audioBufPtr++;
                if (audioBufPtr >= MAX_FRAMES) flush();
            } else {
                preRoll.set(audioChunk, preRollPtr * 512);
                preRollPtr = (preRollPtr + 1) % PRE_ROLL_CAPACITY;
                if (preRollCount < PRE_ROLL_CAPACITY) preRollCount++;
            }
            try {
                const out = await vadModel({ input: new Tensor('float32', audioChunk, [1, 512]), sr: new Tensor('int64', new BigInt64Array([16000n]), [1]), state });
                state = out.stateN || out.staten || state;
                const prob = out.output.data[0];
                if (prob > (isSpeaking ? THRESHOLD_HOLD : THRESHOLD_START)) {
                    if (!isSpeaking) {
                        isSpeaking = true; audioBufPtr = 0;
                        for (let i = 0; i < preRollCount; i++) {
                            let idx = (preRollPtr - preRollCount + i + PRE_ROLL_CAPACITY) % PRE_ROLL_CAPACITY;
                            audioBuf.set(preRoll.subarray(idx * 512, (idx + 1) * 512), audioBufPtr * 512); audioBufPtr++;
                        }
                    }
                    silenceFrames = 0;
                } else if (isSpeaking) {
                    silenceFrames++;
                    if (silenceFrames > SILENCE_LIMIT) { isSpeaking = false; flush(); }
                }
                self.postMessage({ type: 'vad_ui_update', prob, isSpeaking });
            } catch (e) {}
        }

        function flush() {
            if (audioBufPtr > 5) {
                const data = new Float32Array(audioBuf.subarray(0, audioBufPtr * 512));
                pendingChunks.push(data); sendToWhisper();
            }
            audioBufPtr = 0; preRollCount = 0; silenceFrames = 0;
            state = new Tensor('float32', new Float32Array(2*1*128).fill(0), [2, 1, 128]);
        }

        function sendToWhisper() {
            if (isWhisperReady && pendingChunks.length > 0) {
                isWhisperReady = false;
                const chunk = pendingChunks.shift();
                whisperPort.postMessage({ type: 'transcribe', audioBuffer: chunk.buffer }, [chunk.buffer]);
            }
        }

        async function poll() {
            if (!audioArr) return;
            let w = Atomics.load(ptrArr, 0);
            if (w === readPtr) return;
            let len = audioArr.length, chunk;
            if (w > readPtr) { chunk = audioArr.slice(readPtr, w); } 
            else { chunk = new Float32Array(len - readPtr + w); chunk.set(audioArr.subarray(readPtr, len)); chunk.set(audioArr.subarray(0, w), len - readPtr); }
            readPtr = w;
            
            let resampled = resample(chunk, nativeRate, 16000);
            for (let i = 0; i < resampled.length; i++) {
                internalBuffer[internalPtr++] = resampled[i];
                if (internalPtr === 512) { await runVAD(new Float32Array(internalBuffer)); internalPtr = 0; }
            }
        }

        self.onmessage = async (e) => {
            if (e.data.type === 'init_sab') {
                audioArr = new Float32Array(e.data.audioSAB); ptrArr = new Int32Array(e.data.pointerSAB);
                nativeRate = e.data.rate; setInterval(poll, 40);
            } else if (e.data.type === 'load') {
                vadModel = await AutoModel.from_pretrained('onnx-community/silero-vad', { config: { model_type: 'custom' } });
                state = new Tensor('float32', new Float32Array(2*1*128).fill(0), [2, 1, 128]);
                self.postMessage({ type: 'ready' });
            } else if (e.data.type === 'init_whisper_port') {
                whisperPort = e.data.port;
                whisperPort.onmessage = (ev) => { if (ev.data.type === 'READY_FOR_NEXT') { isWhisperReady = true; sendToWhisper(); }};
            }
        };
    `;

    // --- WORKER WHISPER ---
    const whisperWorkerCode = `
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3/dist/transformers.min.js';
        env.allowLocalModels = false;
        let transcriber = null, currentLang = "italian", vadPort = null;

        self.onmessage = async (e) => {
            if (e.data.type === 'load') {
                const model = e.data.precision === 'q8-tiny' ? 'Xenova/whisper-tiny' : 'onnx-community/whisper-large-v3-turbo';
                transcriber = await pipeline('automatic-speech-recognition', model, { 
                    device: 'webgpu', dtype: 'q4f16', progress_callback: (p) => self.postMessage({ type: 'progress', p: p.progress }) 
                }).catch(() => pipeline('automatic-speech-recognition', model, { device: 'wasm', dtype: 'q8' }));
                self.postMessage({ type: 'READY_TO_PROCESS' });
                if (vadPort) vadPort.postMessage({ type: 'READY_FOR_NEXT' });
            } else if (e.data.type === 'init_vad_port') {
                vadPort = e.data.port;
                vadPort.onmessage = async (v) => {
                    const res = await transcriber(new Float32Array(v.data.audioBuffer), { language: currentLang, task: 'transcribe' });
                    self.postMessage({ type: 'final', text: res.text });
                    vadPort.postMessage({ type: 'READY_FOR_NEXT' });
                };
            } else if (e.data.type === 'update_language') { currentLang = e.data.language; }
        };
    `;

    const vadWorker = new Worker(URL.createObjectURL(new Blob([vadWorkerCode], { type: 'application/javascript' })), { type: 'module' });
    const whisperWorker = new Worker(URL.createObjectURL(new Blob([whisperWorkerCode], { type: 'application/javascript' })), { type: 'module' });
    const channel = new MessageChannel();
    vadWorker.postMessage({ type: 'init_whisper_port', port: channel.port1 }, [channel.port1]);
    whisperWorker.postMessage({ type: 'init_vad_port', port: channel.port2 }, [channel.port2]);

    let audioCtx, worklet, stream, lastChar = ".";
    const interimSpan = document.createElement('span'); interimSpan.className = 'interim-text';
    UI.output.appendChild(interimSpan);

    whisperWorker.onmessage = (e) => {
        if (e.data.type === 'READY_TO_PROCESS') {
            UI.status.innerText = "ONLINE"; UI.startBtn.disabled = false; UI.loadBtn.style.display = 'none';
        } else if (e.data.type === 'final') {
            let txt = applyPhoneticCorrections(e.data.text.trim());
            if (txt.length > 1) {
                let pfx = lastChar.match(/[.!?]/) ? " " : " ";
                const node = document.createTextNode(pfx + txt);
                UI.output.insertBefore(node, interimSpan);
                lastChar = txt.slice(-1); UI.output.scrollTop = UI.output.scrollHeight;
            }
        }
    };

    vadWorker.onmessage = (e) => {
        if (e.data.type === 'ready') whisperWorker.postMessage({ type: 'load', precision: UI.precisionSelect.value });
        else if (e.data.type === 'vad_ui_update') {
            UI.vadFill.style.width = (e.data.prob * 100) + "%";
            UI.vadLed.classList.toggle('active', e.data.isSpeaking);
            UI.status.innerText = e.data.isSpeaking ? "RECORDING" : "LISTENING";
        }
    };

    UI.loadBtn.onclick = () => vadWorker.postMessage({ type: 'load' });

    UI.startBtn.onclick = async () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // FIX 2: SharedArrayBuffer Setup
        const audioSAB = new SharedArrayBuffer(audioCtx.sampleRate * 2 * 4);
        const pointerSAB = new SharedArrayBuffer(4);
        vadWorker.postMessage({ type: 'init_sab', audioSAB, pointerSAB, rate: audioCtx.sampleRate });

        const workletCode = `
            class P extends AudioWorkletProcessor {
                constructor() { super(); this.port.onmessage = (e) => { this.sab = new Float32Array(e.data.audioSAB); this.ptr = new Int32Array(e.data.pointerSAB); }; }
                process(inputs) {
                    if (!this.sab) return true;
                    const input = inputs[0][0]; if (!input) return true;
                    let w = Atomics.load(this.ptr, 0);
                    for (let i = 0; i < input.length; i++) { this.sab[w] = input[i]; w = (w + 1) % this.sab.length; }
                    Atomics.store(this.ptr, 0, w);
                    return true;
                }
            }
            registerProcessor('p', P);
        `;
        await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([workletCode], { type: 'application/javascript' })));
        worklet = new AudioWorkletNode(audioCtx, 'p');
        worklet.port.postMessage({ audioSAB, pointerSAB });
        audioCtx.createMediaStreamSource(stream).connect(worklet);
        UI.startBtn.style.display = 'none'; UI.stopBtn.style.display = 'inline-block';
    };

    UI.stopBtn.onclick = () => location.reload();
    UI.clearBtn.onclick = () => { UI.output.innerText = ""; UI.output.appendChild(interimSpan); };
</script>
</body>
</html>
